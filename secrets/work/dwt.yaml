# this file managed by sops-nix
#
# Directory paths
# Where git worktrees are created
worktree_root: ~/worktrees
# Per-worktree data directories
data_root: /data/research/worktrees
# Port allocation state
state_dir: ~/.local/state/dwt
# Fetch from origin before creating worktrees (default: true)
# Set to false to skip fetching, useful with slow/unavailable remotes
fetch_on_create: false
# Network isolation (iptables rules)
network:
    blocked_networks:
        # Block entire private network
        - 10.0.0.0/8
    allowed_hosts:
        # Whitelist all ports to an IP
        - 10.1.1.245
        # Whitelist a specific TCP port
        - 10.4.5.6:8080
        # Hostname with specific port
        - myhost.local:443
    host_access_ports:
        # TCP ports allowed to reach host machine
        - 5000
# Container settings
container:
    image: dwt-dev:latest
    # Container name prefix
    prefix: dwt-myname
    port_services:
        jupyter:
            # Jupyter ports: 8889, 8890, ...
            start_port: 8889
# Repositories - worktrees created for each, mounted at same path as host
repos:
    # myrepo:
    #   host_src_path: ~/work/myrepo
    #   required: true                   # Fail if repo doesn't exist
    #   editable_installs:               # pip install -e on container start (optional)
    #     env: myenv                     # Conda env to activate before pip
    #     packages:                      # Paths relative to repo root
    #       - .
    nectar:
        host_src_path: ~/repo/nectar
        required: true
    deployment:
        host_src_path: ~/repo/deployment
        required: true
    chakra:
        host_src_path: ~/repo/chakra
        required: true
# Additional mounts
mounts:
    - host: ~/.gitconfig
      container: ~/.gitconfig
      # ro = read-only, rw = read-write
      mode: ro
      # Skip if doesn't exist
      required: false
    - host: ~/miniconda
      container: ~/miniconda
      # ro = read-only, rw = read-write
      mode: ro
      # Skip if doesn't exist
      required: true
# Environment variables
env_vars:
    - name: CLAUDE_CODE_OAUTH_TOKEN
      value: ${CLAUDE_CODE_OAUTH_TOKEN}
      # Always set
      conditional: true
# Jupyter configuration
jupyter:
    # Conda env with jupyter (for 'dwt lab' and login shells)
    env: olympus
# Conda environments baked into the image during `dwt build` (optional)
# conda_envs:
#   - name: myenv
#     environment: ~/path/to/environment.yml
# Activate a conda env in container shells (optional, prefer jupyter.env + conda_envs)
# conda_env: myenv
# Primary repo for tab completion (optional)
primary_repo: nectar
